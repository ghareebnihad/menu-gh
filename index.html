  <!-- Google Fonts & FontAwesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <style>
/* Premium Design System */
    :root {
      --bg-color: #0b0c10;
      --surface-color: #1f2833;
      --card-bg: #151a21;
      --text-color: #f5f5f7;
      --accent-color: #c5a030; /* Premium Gold */
      --accent-hover: #e5c158;
      --secondary-text: #9ca3af;
      --orange-active: #ff7a00;
      --glass-bg: rgba(21, 26, 33, 0.85);
      --font-sans: 'Inter', sans-serif;
      --font-serif: 'Playfair Display', serif;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      zoom: 0.90;
      font-family: var(--font-sans);
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Core Menu Layout --- */
    .container { width: 92%; max-width: 1000px; margin: 0 auto; }

    .header {
      background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, var(--bg-color) 100%);
      padding: 50px 0 30px 0;
      text-align: center;
      position: relative;
    }
    .header-bg-img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(1.2px); /* Bulanıklık */
  opacity: 0.5;      /* %50 Opacity */
  z-index: 0;
}

/* Yazıların resmin üstünde görünmesi için: */
.header .container {
  position: relative;
  z-index: 1;
}

    .restaurant-name {
      font-family: var(--font-serif);
      font-size: 3rem;
      font-weight: 700;
      color: var(--accent-color);
      margin-bottom: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .cuisine-text {
      font-size: 1rem;
      color: var(--secondary-text);
      margin-bottom: 25px;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .contact-info {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      font-size: 0.95rem;
      color: var(--text-color);
      opacity: 0.9;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 400;
    }

    .contact-item i { color: var(--accent-color); font-size: 1.05rem; }

    /* Sticky Tab Navigation */
    .sticky-nav {
      position: sticky;
      top: 0;
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 15px 0;
    }

    .menu-tabs {
      display: flex;
      overflow-x: auto;
      gap: 12px;
      padding: 5px 0;
      white-space: nowrap;
      scrollbar-width: none;
    }

    .menu-tabs::-webkit-scrollbar { display: none; }

    .tab-button {
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 125px;
      height: 125px;
      flex-shrink: 0;
      background-color: var(--card-bg);
      color: var(--secondary-text);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: var(--transition);
      font-weight: 500;
      font-size: 0.95rem;
      gap: 12px;
      display: flex;
    }

    .tab-button i { font-size: 2.2rem; color: var(--accent-color); transition: var(--transition); }
    .tab-button:hover { background-color: rgba(255,255,255,0.08); color: var(--text-color); }

    .tab-button.active {
      background-color: var(--accent-color);
      color: var(--bg-color);
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(197, 160, 48, 0.3);
      border-color: transparent;
    }
    .tab-button.active i { color: var(--bg-color); }

    /* View Controls (Devre dışı bırakıldı) */
    .view-controls { display: none !important; }

    /* Menu Sections */
    .menu-section { display: none; animation: fadeIn 0.4s ease; }
    .menu-section.active { display: block; }

    .menu-section h2 {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      color: var(--accent-color);
      margin-bottom: 25px;
      position: relative;
      padding-bottom: 8px;
    }

    .menu-section h2::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 50px;
      height: 2px;
      background-color: var(--accent-color);
    }
    body[dir="rtl"] .menu-section h2::after { left: auto; right: 0; }

    /* SABİT 2x2 GRID YAPISI */
    .menu-grid { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 15px; 
      margin-bottom: 40px; 
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      background-color: var(--card-bg);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: var(--transition);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .item-image-wrapper { position: relative; width: 100%; height: 180px; overflow: hidden; }
    .item-image { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
    .item-details { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
    .item-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 5px; margin-bottom: 5px; }
    .item-name { font-size: 1rem; font-weight: 600; }
    .price { font-size: 0.95rem; font-weight: 700; color: var(--accent-color); white-space: nowrap; }

    /* Language Welcoming Overlay */
    #language-selection {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #1f2833 0%, #0b0c10 100%);
      z-index: 9999;
      color: #ffffff;
      text-align: center;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 20px;
    }
    #language-selection.hidden { opacity: 0; pointer-events: none; }
    #language-selection .logo { font-family: var(--font-serif); font-size: 3.5rem; color: var(--accent-color); margin-bottom: 5px; }
    #language-selection 
    .buttons-container { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 250px; }
    
    #language-selection button {
  padding: 25px; font-size: 1.5rem; border-radius: 65px; cursor: pointer;
  border: 2px solid #c5a030; background: rgba(255,255,255,0.05); 
  color: #fff; font-family: "Smooch Sans", sans-serif; font-weight: 800; text-transform: uppercase;
}
#language-selection button:hover { background: #c5a030; color: #000; }

    .menu-wrapper { display: none; flex-direction: column; min-height: 100vh; }
    body.lang-selected .menu-wrapper { display: flex; }
    
   .social-links { display: flex; gap: 20px; margin-top: 50px; }
.social-icon {
  width: 55px; height: 55px; border-radius: 50%; border: 1px solid #c5a030;
  display: flex; align-items: center; justify-content: center; color: #c5a030;
  font-size: 1.6rem; text-decoration: none; transition: 0.3s;
}
.social-icon:hover { background: #c5a030; color: #000; transform: scale(1.1); }

.footer {
  position: fixed; /* Sabitler */
  bottom: 0;       /* En alta yaslar */
  left: 0;
  width: 100%;     /* Ekran genişliğini kaplar */
  padding: 15px 0; /* Yüksekliği biraz azalttım, içerik alanını daraltmasın diye */
  background-color: #060709;
  text-align: center;
  font-size: 0.85rem;
  color: var(--secondary-text);
  z-index: 1000;   /* Diğer öğelerin üzerine çıkması için */
}

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const data = JSON.parse(document.getElementById("menu-data").textContent);
  const langSelection = document.getElementById("language-selection");
  const body = document.body;
  let activeView = "grid-view-2";

  langSelection.addEventListener("click", e => {
    const btn = e.target.closest("button");
    if (!btn) return;

    document.querySelectorAll('#language-selection button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const selectedLang = btn.dataset.lang;
    body.setAttribute('dir', selectedLang === 'ar' ? 'rtl' : 'ltr');
    langSelection.classList.add('hidden');

    setTimeout(() => {
      body.classList.add('lang-selected');
      loadMenu(selectedLang);
    }, 400);
  });

  function loadMenu(lang) {
    const translations = data[lang].translations;
    const menu = data[lang].menu;

    document.getElementById("restaurant-name").textContent = translations.restaurantName;
    document.getElementById("cuisine-text").textContent = translations.cuisineText;
    document.getElementById("location-text").innerHTML = translations.locationText;
    document.getElementById("reservation-text").innerHTML = translations.reservationText;
    document.getElementById("footer-text").innerHTML = translations.footerText;

    const menuTabs = document.getElementById("menu-tabs");
    const menuContent = document.getElementById("menu-content");

    menuTabs.innerHTML = "";
    menuContent.innerHTML = "";

    Object.keys(menu).forEach((key, i) => {
      const cat = menu[key];
      const tab = document.createElement("button");
      tab.className = "tab-button";
      tab.dataset.category = key;
      tab.innerHTML = `<i class="${cat.icon}"></i><span>${cat.title}</span>`;
      if (i === 0) tab.classList.add("active");
      menuTabs.appendChild(tab);

      const section = document.createElement("div");
      section.id = `section-${key}`;
      section.className = "menu-section";
      if (i === 0) section.classList.add("active");
      section.innerHTML = `<h2>${cat.title}</h2><div class="menu-grid ${activeView}"></div>`;

      cat.items.forEach(item => {
        const itemDiv = document.createElement("div");
        itemDiv.className = "menu-item";
        itemDiv.innerHTML = `
          <div class="item-image-wrapper">
            <img src="${item.img}" alt="${item.name}" class="item-image" loading="lazy"/>
          </div>
          <div class="item-details">
            <div class="item-header">
              <span class="item-name">${item.name}</span>
              <span class="price">${item.price}</span>
            </div>
          </div>
        `;
        section.querySelector(".menu-grid").appendChild(itemDiv);
      });
      menuContent.appendChild(section);
    });

    document.querySelectorAll(".tab-button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.querySelectorAll(".menu-section").forEach(sec => sec.classList.remove("active"));
        document.getElementById(`section-${btn.dataset.category}`).classList.add("active");
        btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      });
    });

    document.querySelectorAll(".view-button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".view-button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeView = btn.dataset.view;
        document.querySelectorAll(".menu-grid").forEach(grid => {
          grid.className = `menu-grid ${activeView}`;
        });
      });
    });
  }
});
</script>
