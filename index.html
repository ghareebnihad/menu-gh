<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=0.65, maximum-scale=5.0" />
  <title>DUHOK REST & CAFFE - Digital Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
 <style>
    /* Premium Design System */
    :root {
      --bg-color: #07080a;
      --bg-gradient: radial-gradient(circle at 50% 0%, #1a222d 0%, #07080a 70%);
      --surface-color: #1f2833;
      --card-bg: rgba(21, 26, 33, 0.85);
      --text-color: #f5f5f7;
      
      /* Kafe ana rengi */
      --accent-color: #c5a030; 
      --accent-hover: #e5c158;
      
      --secondary-text: #9ca3af;
      --glass-bg: rgba(7, 8, 10, 0.80);
      --font-sans: 'Inter', sans-serif;
      --font-serif: 'Playfair Display', serif;
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      zoom: 0.96;
      font-family: var(--font-sans);
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-color);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Core Menu Layout --- */
    .container { width: 92%; max-width: 1000px; margin: 0 auto; }

    .header {
      background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
      padding: 60px 0 40px 0;
      text-align: center;
      position: relative;
    }
    
    .header-bg-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(2px);
      opacity: 0.3;
      z-index: 0;
    }

    .header .container { position: relative; z-index: 1; }

    .restaurant-name {
      font-family: var(--font-serif);
      font-size: 3.2rem;
      font-weight: 700;
      color: var(--accent-color);
      margin-bottom: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .cuisine-text {
      font-size: 1rem;
      color: var(--secondary-text);
      margin-bottom: 25px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .contact-info {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .contact-item { display: flex; align-items: center; gap: 8px; }
    .contact-item i { color: var(--accent-color); }

    /* --- STICKY NAV & KATEGORİ KARELERİ --- */
    .sticky-nav {
      position: sticky;
      top: 0;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
      border-bottom: 1px solid rgba(197, 160, 48, 0.1);
      padding: 20px 0;
    }

    .menu-tabs {
      display: flex;
      overflow-x: auto;
      gap: 15px;
      padding: 5px 5px;
      white-space: nowrap;
      scrollbar-width: none;
    }

    .menu-tabs::-webkit-scrollbar { display: none; }

    /* Çerçeve boyutları korundu */
    .tab-button {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 115px;
      height: 115px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: var(--transition);
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      gap: 8px;
      box-shadow: inset 0 1px 0px rgba(255,255,255,0.1);
    }

    /* İkonlar %8 daha büyütüldü: 2.2rem -> 2.38rem yapıldı */
    .tab-button i { 
      font-size: 2.38rem; 
      color: #ffffff; 
      transition: var(--transition); 
    }
    
    .tab-button:hover { 
      background: rgba(197, 160, 48, 0.15); 
      color: var(--text-color);
      border-color: var(--accent-color);
      transform: translateY(-2px);
    }
    
    .tab-button:hover i { color: var(--accent-color); }

    .tab-button.active {
      background: linear-gradient(145deg, var(--accent-color), #9a7b20);
      color: #000000 !important;
      font-weight: 700;
      box-shadow: 0 8px 25px rgba(197, 160, 48, 0.35), inset 0 1px 2px rgba(255,255,255,0.4);
      border-color: transparent;
      transform: translateY(-4px);
    }
    .tab-button.active i { color: #000000 !important; font-weight: 700; }

    /* Görünüm Değiştirme */
    .view-controls {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin: 25px 0;
    }
    
    body[dir="rtl"] .view-controls {
      justify-content: flex-start;
    }

    .view-button {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--secondary-text);
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: var(--transition);
    }

    .view-button:hover, .view-button.active {
      background: rgba(197, 160, 48, 0.15);
      border-color: var(--accent-color);
      color: var(--accent-color);
    }

    /* Menu Sections */
    .menu-section { display: none; animation: fadeIn 0.5s ease; }
    .menu-section.active { display: block; }

    .menu-section h2 {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      color: var(--accent-color);
      margin-bottom: 30px;
      position: relative;
      padding-bottom: 12px;
      letter-spacing: 1px;
    }

    .menu-section h2::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-color), transparent);
    }
    
    body[dir="rtl"] .menu-section h2::after {
      left: auto;
      right: 0;
      background: linear-gradient(270deg, var(--accent-color), transparent);
    }

    /* --- BÜTÜNLEŞİK KUTU SİSTEMİ --- */
    .menu-grid { 
      display: grid;
      gap: 25px; 
      margin-bottom: 50px; 
      transition: var(--transition);
      width: 100%;
    }

    /* 1. Grid Görünümü */
    .menu-grid.grid-view-2 { 
      grid-template-columns: repeat(2, 1fr); 
    }
    
    .menu-grid.grid-view-2 .menu-item {
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    
    .menu-grid.grid-view-2 .item-image-wrapper { 
      position: relative; 
      width: 100%; 
      padding-top: 100%;
      overflow: hidden;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    .menu-grid.grid-view-2 .item-image { 
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%; 
      object-fit: cover; 
      transition: var(--transition); 
    }
    
    .menu-grid.grid-view-2 .item-details { 
      background: rgba(20, 25, 35, 0.6);
      padding: 14px 10px;
      width: 100%;
    }

    .menu-grid.grid-view-2 .item-header { 
      display: flex; 
      flex-direction: column; 
      align-items: flex-start; 
      gap: 6px; 
    }
    
    body[dir="rtl"] .menu-grid.grid-view-2 .item-header { 
      align-items: flex-start; 
    }
    
    /* İsim %10 büyütüldü: 1rem -> 1.1rem yapıldı */
    .menu-grid.grid-view-2 .item-name { 
      font-size: 1.1rem; 
      font-weight: 500; 
      color: #ffffff; 
      word-break: break-word;
      line-height: 1.3;
    }
    
    .menu-grid.grid-view-2 .price { 
      font-size: 1.05rem; 
      font-weight: 600; 
      color: var(--accent-color); 
    }

    /* 2. Liste Görünümü */
    .menu-grid.list-view {
      grid-template-columns: 1fr;
      gap: 15px;
    }
    
    .menu-grid.list-view .menu-item {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-md);
      padding: 10px;
      gap: 15px;
      width: 100%;
      box-shadow: var(--shadow);
    }
    
    .menu-grid.list-view .item-image-wrapper {
      width: 75px;
      height: 75px;
      flex-shrink: 0;
      border-radius: var(--radius-sm);
      overflow: hidden;
      position: relative;
    }
    
    body[dir="rtl"] .menu-grid.list-view .item-image-wrapper {
      border-left: 1px solid rgba(255, 255, 255, 0.1);
    }
    body[dir="ltr"] .menu-grid.list-view .item-image-wrapper {
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .menu-grid.list-view .item-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .menu-grid.list-view .item-details {
      flex: 1;
      background: transparent;
      padding: 0;
    }
    
    .menu-grid.list-view .item-header {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      gap: 15px;
    }
    
    /* Liste görünümünde de isim %10 büyütüldü: 1.05rem -> 1.15rem yapıldı */
    .menu-grid.list-view .item-name { font-size: 1.15rem; font-weight: 500; color: #ffffff; }
    .menu-grid.list-view .price { font-size: 1.05rem; font-weight: 600; color: var(--accent-color); white-space: nowrap; }

    /* Hover efekti */
    .menu-item:hover .item-image { transform: scale(1.05); }
    .menu-item:hover { border-color: rgba(197, 160, 48, 0.4); }

    /* Dil Seçim Ekranı */
    #language-selection {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #1f2833 0%, #0b0c10 100%);
      z-index: 9999;
      color: #ffffff;
      text-align: center;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 20px;
    }
    #language-selection.hidden { opacity: 0; pointer-events: none; }
    #language-selection .logo { font-family: var(--font-serif); font-size: 3.5rem; color: var(--accent-color); margin-bottom: 5px; }
    
    #language-selection .buttons-container { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 250px; }
    #language-selection button {
      padding: 20px; font-size: 1.4rem; border-radius: 65px; cursor: pointer;
      border: 2px solid var(--accent-color); background: rgba(255,255,255,0.05); 
      color: #fff; font-family: "Smooch Sans", sans-serif; font-weight: 800; text-transform: uppercase;
      letter-spacing: 2px; transition: var(--transition);
    }
    #language-selection button:hover { background: var(--accent-color); color: #000; transform: scale(1.05); }

    /* Ana Sarıcı Yapısı */
    .menu-wrapper { 
      display: none; 
      flex-direction: column; 
      min-height: 100vh; 
      width: 100%;
    }
    body.lang-selected .menu-wrapper { display: flex; }
    
    main.container {
      flex: 1 0 auto;
      padding-bottom: 40px;
      width: 92%;
    }
    
    .social-links { display: flex; gap: 25px; margin-top: 55px; justify-content: center;}
    .social-icon {
      width: 60px; height: 60px; border-radius: 50%; border: 1px solid var(--accent-color);
      display: flex; align-items: center; justify-content: center; color: var(--accent-color);
      font-size: 1.4rem; text-decoration: none; transition: 0.3s;
    }
    .social-icon:hover { background: var(--accent-color); color: #000; transform: scale(1.1); }

    .footer {
      flex-shrink: 0;
      width: 100%;
      padding: 25px 0;
      background-color: #050608;
      text-align: center;
      font-size: 0.85rem;
      color: var(--secondary-text);
      border-top: 1px solid rgba(255,255,255,0.03);
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Mobil Düzenlemeler */
    @media (max-width: 600px) {
      .menu-grid { gap: 16px; }
      .menu-grid.grid-view-2 { gap: 12px; }
      .grid-view-2 .item-details { padding: 8px 6px; }
      
      /* Mobilde isim boyutu dengelendi */
      .grid-view-2 .item-name { font-size: 1rem; }
      .grid-view-2 .price { font-size: 0.85rem; }
      
      /* Mobilde ikon boyutu %8 artışa göre güncellendi */
      .tab-button { width: 95px; height: 95px; font-size: 0.75rem; }
      .tab-button i { font-size: 1.95rem; } 
      
      .menu-grid.list-view .menu-item { gap: 10px; padding: 8px; }
      .menu-grid.list-view .item-image-wrapper { width: 65px; height: 65px; }
      .menu-grid.list-view .item-name { font-size: 1rem; }
      .menu-grid.list-view .price { font-size: 0.90rem; }
    }
  </style>
</head>
<body>

<div id="language-selection">
  <div class="logo">Duhok Rest & Caffee</div>

  <div class="buttons-container" style="flex-direction: column; width: 100%; max-width: 280px;">
    <button data-lang="en" style="width: 100%;">English</button>
    <button data-lang="ar" style="width: 100%;">العربية</button>
  </div>
  <div class="social-links">
    <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
    <a href="#" class="social-icon"><i class="fab fa-whatsapp"></i></a>
    <a href="#" class="social-icon"><i class="fab fa-snapchat"></i></a>
  </div>
</div>

<div class="menu-wrapper">
    <header class="header">
    <img src="https://resizer.otstatic.com/v3/photos/52293729-4" alt="Background" class="header-bg-img">
      <div class="container">
        <h1 class="restaurant-name" id="restaurant-name"></h1>
        <p class="cuisine-text" id="cuisine-text"></p>
        <div class="contact-info">
          <span class="contact-item" id="location-text"></span>
          <span class="contact-item" id="reservation-text"></span>
        </div>
      </div>
    </header>

    <nav class="sticky-nav">
      <div class="container">
        <div class="menu-tabs" id="menu-tabs"></div>
      </div>
    </nav>

    <main class="container">
      <div class="view-controls">
          <button class="view-button active" data-view="grid-view-2" aria-label="Grid View"><i class="fas fa-th-large"></i></button>
          <button class="view-button" data-view="list-view" aria-label="List View"><i class="fas fa-list"></i></button>
      </div>
      <div class="menu-content" id="menu-content"></div>
    </main>

    <footer class="footer">
      <div class="container">
        <p id="footer-text"></p>
      </div>
    </footer>
</div>

<script id="menu-script">
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpEvyH9Kzk9aMNPhhKYzEyy2MbuMsx4qCyLwrDB0kPsqio0HWvlcIFPyQPJHTz4UJPm0eMr5X2qvWk/pub?output=csv";

  document.addEventListener("DOMContentLoaded", () => {
    const langSelection = document.getElementById("language-selection");
    const body = document.body;
    let activeView = "grid-view-2";
    let cachedData = null;

    langSelection.addEventListener("click", async (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      document.querySelectorAll('#language-selection button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const selectedLang = btn.dataset.lang;
      body.setAttribute('dir', selectedLang === 'ar' ? 'rtl' : 'ltr');
      langSelection.classList.add('hidden');
      
      try {
        if (!cachedData) {
          const response = await fetch(SHEET_URL);
          if (!response.ok) throw new Error("Veri çekilemedi.");
          const csvText = await response.text();
          cachedData = parseCSVToMenuData(csvText);
        }
        
        setTimeout(() => {
          body.classList.add('lang-selected');
          loadMenu(cachedData, selectedLang);
        }, 400);

      } catch (error) {
        console.error("Hata:", error);
        alert("Menü yüklenirken bir hata oluştu.");
      }
    });

    function parseCSVToMenuData(csvText) {
      const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
      
      const menuData = {
        "en": {
          "translations": {
            "restaurantName": "DUHOK REST & CAFFE",
            "cuisineText": "Mediterranean cuisine, premium coffee & hookah",
            "locationText": "<i class='fas fa-map-marker-alt'></i> Duhok KRO",
            "reservationText": "<i class='fas fa-phone-alt'></i> 0750 222 22 22",
            "footerText": "Developed | <strong> by Ghareeb</strong>"
          },
          "menu": {}
        },
        "ar": {
          "translations": {
            "restaurantName": "دهوك REST & CAFFE",
            "cuisineText": "مأكولات متوسطية، قهوة فاخرة وأرجيلة مميزة",
            "locationText": "<i class='fas fa-map-marker-alt'></i> دهوك KRO",
            "reservationText": "<i class='fas fa-phone-alt'></i> 0750 222 22 22",
            "footerText": "جميع الحقوق محفوظة | <strong>تم التطوير بواسطة Ghareeb</strong>"
          },
          "menu": {}
        }
      };

      for (let i = 1; i < lines.length; i++) {
        const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(item => item.replace(/^"|"$/g, '').trim());
        if (row.length < 8) continue;

        const [catId, catEn, catAr, catIcon, nameEn, nameAr, price, img] = row;
        if (!catId) continue;

        if (!menuData.en.menu[catId]) {
          menuData.en.menu[catId] = { "title": catEn, "icon": catIcon, "items": [] };
        }
        menuData.en.menu[catId].items.push({ "name": nameEn, "price": price, "img": img });

        if (!menuData.ar.menu[catId]) {
          menuData.ar.menu[catId] = { "title": catAr, "icon": catIcon, "items": [] };
        }
        menuData.ar.menu[catId].items.push({ "name": nameAr, "price": price, "img": img });
      }
      return menuData;
    }

    function loadMenu(data, lang) {
      const translations = data[lang].translations;
      const menu = data[lang].menu;

      document.getElementById("restaurant-name").textContent = translations.restaurantName;
      document.getElementById("cuisine-text").textContent = translations.cuisineText;
      document.getElementById("location-text").innerHTML = translations.locationText;
      document.getElementById("reservation-text").innerHTML = translations.reservationText;
      document.getElementById("footer-text").innerHTML = translations.footerText;

      const menuTabs = document.getElementById("menu-tabs");
      const menuContent = document.getElementById("menu-content");

      menuTabs.innerHTML = "";
      menuContent.innerHTML = "";

      Object.keys(menu).forEach((key, i) => {
        const cat = menu[key];
        const tab = document.createElement("button");
        tab.className = "tab-button";
        tab.dataset.category = key;
        tab.innerHTML = `<i class="${cat.icon}"></i><span>${cat.title}</span>`;
        if (i === 0) tab.classList.add("active");
        menuTabs.appendChild(tab);

        const section = document.createElement("div");
        section.id = `section-${key}`;
        section.className = "menu-section";
        if (i === 0) section.classList.add("active");
        section.innerHTML = `<h2>${cat.title}</h2><div class="menu-grid ${activeView}"></div>`;

        cat.items.forEach(item => {
          const itemDiv = document.createElement("div");
          itemDiv.className = "menu-item";
          itemDiv.innerHTML = `
            <div class="item-image-wrapper">
              <img src="${item.img}" alt="${item.name}" class="item-image" loading="lazy"/>
            </div>
            <div class="item-details">
              <div class="item-header">
                <span class="item-name">${item.name}</span>
                <span class="price">${item.price}</span>
              </div>
            </div>
          `;
          section.querySelector(".menu-grid").appendChild(itemDiv);
        });
        menuContent.appendChild(section);
      });

      document.querySelectorAll(".tab-button").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-button").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          document.querySelectorAll(".menu-section").forEach(sec => sec.classList.remove("active"));
          document.getElementById(`section-${btn.dataset.category}`).classList.add("active");
          btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        });
      });

      document.querySelectorAll(".view-button").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".view-button").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          activeView = btn.dataset.view;
          document.querySelectorAll(".menu-grid").forEach(grid => {
            grid.className = `menu-grid ${activeView}`;
          });
        });
      });
    }
  });
</script>

</body>
</html>
