<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=0.65, maximum-scale=5.0" />
  <title>DUHOK REST & CAFFE - Digital Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
 <style>
    /* Premium Coffee & Caramel Design System */
    :root {
      --bg-color: #0f0805;
      --bg-gradient: radial-gradient(circle at 50% 0%, #3b2314 0%, #0f0805 75%);
      --surface-color: #26140a;
      --card-bg: rgba(38, 20, 10, 0.85);
      --text-color: #f7f5f0;
      
      /* Sıcak Karamel Ana Renk */
      --accent-color: #c68642; 
      --accent-hover: #e0a363;
      
      --secondary-text: #bfa89b;
      --glass-bg: rgba(15, 8, 5, 0.85);
      --font-sans: 'Inter', sans-serif;
      --font-serif: 'Playfair Display', serif;
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
      --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      zoom: 0.96;
      font-family: var(--font-sans);
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-color);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Core Menu Layout --- */
    .container { width: 92%; max-width: 1000px; margin: 0 auto; }

    .header {
      background: linear-gradient(180deg, rgba(15, 8, 5, 0.95) 0%, transparent 100%);
      padding: 60px 0 40px 0;
      text-align: center;
      position: relative;
    }
    
    .header-bg-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(3px);
      opacity: 0.25;
      z-index: 0;
    }

    .header .container { position: relative; z-index: 1; }

    .restaurant-name {
      font-family: var(--font-serif);
      font-size: 3.2rem;
      font-weight: 700;
      color: var(--accent-color);
      margin-bottom: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
    }

    .cuisine-text {
      font-size: 1rem;
      color: var(--secondary-text);
      margin-bottom: 25px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .contact-info {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .contact-item { display: flex; align-items: center; gap: 8px; }
    .contact-item i { color: var(--accent-color); }

    /* --- STICKY NAV & KATEGORİ SİSTEMİ --- */
    .sticky-nav {
      position: sticky;
      top: 0;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
      border-bottom: 1px solid rgba(198, 134, 66, 0.15);
      padding: 25px 0;
    }

    .menu-tabs {
      display: flex;
      overflow-x: auto;
      gap: 28px;
      padding: 5px 5px;
      white-space: nowrap;
      scrollbar-width: none;
    }

    .menu-tabs::-webkit-scrollbar { display: none; }

    .tab-button {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 125px;
      height: auto;
      flex-shrink: 0;
      background: none;
      color: var(--secondary-text);
      border: none;
      border-radius: 0;
      cursor: pointer;
      transition: var(--transition);
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      gap: 14px;
      padding: 10px 0;
      outline: none;
    }

    /* Kategori ikon boyutu %30 daha büyütüldü (2.98rem -> 3.87rem) */
    .tab-button i { 
      font-size: 3.87rem; 
      color: var(--secondary-text); 
      transition: var(--transition); 
    }
    
    .tab-button:hover { 
      color: var(--text-color);
      transform: translateY(-2px);
    }
    
    .tab-button:hover i { color: var(--text-color); }

    .tab-button.active {
      background: none;
      color: var(--accent-color) !important;
      font-weight: 600;
      transform: translateY(-4px);
    }
    .tab-button.active i { 
      color: var(--accent-color) !important; 
    }

    /* --- GÖRÜNÜM BUTONLARI (%40 BÜYÜTÜLDÜ) --- */
    .view-controls {
      display: flex;
      justify-content: flex-end;
      gap: 24px;
      margin: 30px 0;
    }
    
    body[dir="rtl"] .view-controls {
      justify-content: flex-start;
    }

    .view-button {
      background: none;
      border: none;
      color: var(--secondary-text);
      width: 77px; /* 55px -> 77px (%40 büyütüldü) */
      height: 77px; /* 55px -> 77px (%40 büyütüldü) */
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.53rem; /* 1.81rem -> 2.53rem (%40 büyütüldü) */
      transition: var(--transition);
      padding: 0;
      outline: none;
    }

    .view-button:hover, .view-button.active {
      color: var(--accent-color);
      transform: scale(1.05);
    }

    /* Menu Sections */
    .menu-section { display: none; animation: fadeIn 0.5s ease; }
    .menu-section.active { display: block; }

    .menu-section h2 {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      color: var(--accent-color);
      margin-bottom: 30px;
      position: relative;
      padding-bottom: 12px;
      letter-spacing: 1px;
    }

    .menu-section h2::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-color), transparent);
    }
    
    body[dir="rtl"] .menu-section h2::after {
      left: auto;
      right: 0;
      background: linear-gradient(270deg, var(--accent-color), transparent);
    }

    /* --- ÜRÜN GRID YAPISI --- */
    .menu-grid { 
      display: grid;
      gap: 25px; 
      margin-bottom: 50px; 
      transition: var(--transition);
      width: 100%;
    }

    /* 1. Grid Görünümü (Yan Yana Tam 1:1 Kare) */
    .menu-grid.grid-view-2 { 
      grid-template-columns: repeat(2, 1fr); 
    }
    
    .menu-grid.grid-view-2 .menu-item {
      display: flex;
      flex-direction: column;
      background: rgba(38, 20, 10, 0.4);
      border: 1px solid rgba(198, 134, 66, 0.12);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    
    .menu-grid.grid-view-2 .item-image-wrapper { 
      position: relative; 
      width: 100%; 
      aspect-ratio: 1 / 1; 
      padding-top: 0;
      overflow: hidden;
      border-bottom: 1px solid rgba(198, 134, 66, 0.2);
    }
    
    .menu-grid.grid-view-2 .item-image { 
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%; 
      object-fit: cover; 
      transition: var(--transition); 
    }
    
    .menu-grid.grid-view-2 .item-details { 
      background: rgba(24, 12, 6, 0.75);
      padding: 14px 12px;
      width: 100%;
    }

    .menu-grid.grid-view-2 .item-header { 
      display: flex; 
      flex-direction: column; 
      align-items: flex-start; 
      gap: 6px; 
    }
    
    .menu-grid.grid-view-2 .item-name { 
      font-size: 1.26rem; 
      font-weight: 500; 
      color: #ffffff; 
      word-break: break-word;
      line-height: 1.3;
    }
    
    .menu-grid.grid-view-2 .price { 
      font-size: 1.21rem; 
      font-weight: 600; 
      color: var(--accent-color); 
    }

    /* 2. Liste Görünümü (Görseller Tam 1:1 Kare) */
    .menu-grid.list-view {
      grid-template-columns: 1fr;
      gap: 22px; 
    }
    
    .menu-grid.list-view .menu-item {
      display: flex;
      align-items: center;
      background: rgba(38, 20, 10, 0.4);
      border: 1px solid rgba(198, 134, 66, 0.12);
      border-radius: var(--radius-lg); 
      padding: 15px; 
      gap: 22px;
      width: 100%;
      box-shadow: var(--shadow);
    }
    
    .menu-grid.list-view .item-image-wrapper {
      width: 112px;  
      height: 112px; 
      aspect-ratio: 1 / 1; 
      flex-shrink: 0;
      border-radius: var(--radius-md);
      overflow: hidden;
      position: relative;
    }
    
    body[dir="rtl"] .menu-grid.list-view .item-image-wrapper {
      border-left: 1px solid rgba(198, 134, 66, 0.15);
    }
    body[dir="ltr"] .menu-grid.list-view .item-image-wrapper {
      border-right: 1px solid rgba(198, 134, 66, 0.15);
    }

    .menu-grid.list-view .item-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .menu-grid.list-view .item-details {
      flex: 1;
      background: transparent;
      padding: 0;
    }
    
    .menu-grid.list-view .item-header {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      gap: 15px;
    }
    
    .menu-grid.list-view .item-name { 
      font-size: 1.65rem; 
      font-weight: 500; 
      color: #ffffff; 
    }
    
    .menu-grid.list-view .price { 
      font-size: 1.51rem; 
      font-weight: 600; 
      color: var(--accent-color); 
      white-space: nowrap; 
    }

    /* Hover efekti */
    .menu-item:hover .item-image { transform: scale(1.05); }
    .menu-item:hover { border-color: rgba(198, 134, 66, 0.45); }

    /* --- DİL SEÇİM EKRANI (AŞAĞI KAYDIRILDI VE %25 BÜYÜTÜLDÜ) --- */
    #language-selection {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #3b2314 0%, #0f0805 100%);
      z-index: 9999;
      color: #ffffff;
      text-align: center;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 20px;
    }
    #language-selection.hidden { opacity: 0; pointer-events: none; }
    #language-selection .logo { font-family: var(--font-serif); font-size: 3.5rem; color: var(--accent-color); margin-bottom: 5px; }
    
    /* Buton konteynırına yukarıdan boşluk verilerek aşağı indirildi */
    #language-selection .buttons-container { 
      display: flex; 
      flex-direction: column; 
      gap: 20px; 
      width: 100%; 
      max-width: 350px; /* Buton genişliği %25 oranında artırıldı */
      margin-top: 50px; /* Butonlar biraz aşağı indirildi */
    }
    
    /* Dil butonları %25 büyütüldü */
    #language-selection button {
      padding: 25px; /* 20px -> 25px (%25 büyütüldü) */
      font-size: 1.75rem; /* 1.4rem -> 1.75rem (%25 büyütüldü) */
      border-radius: 80px; 
      cursor: pointer;
      border: 2px solid var(--accent-color); 
      background: rgba(255,255,255,0.05); 
      color: #fff; 
      font-family: "Smooch Sans", sans-serif; 
      font-weight: 800; 
      text-transform: uppercase;
      letter-spacing: 2px; 
      transition: var(--transition);
    }
    #language-selection button:hover { background: var(--accent-color); color: #000; transform: scale(1.03); }

    /* Ana Sarıcı Yapısı */
    .menu-wrapper { 
      display: none; 
      flex-direction: column; 
      min-height: 100vh; 
      width: 100%;
    }
    body.lang-selected .menu-wrapper { display: flex; }
    
    main.container {
      flex: 1 0 auto;
      padding-bottom: 40px;
      width: 92%;
    }
    
    .social-links { display: flex; gap: 25px; margin-top: 55px; justify-content: center;}
    .social-icon {
      width: 60px; height: 60px; border-radius: 50%; border: 1px solid var(--accent-color);
      display: flex; align-items: center; justify-content: center; color: var(--accent-color);
      font-size: 1.4rem; text-decoration: none; transition: 0.3s;
    }
    .social-icon:hover { background: var(--accent-color); color: #000; transform: scale(1.1); }

    .footer {
      flex-shrink: 0;
      width: 100%;
      padding: 25px 0;
      background-color: #080402;
      text-align: center;
      font-size: 0.85rem;
      color: var(--secondary-text);
      border-top: 1px solid rgba(198, 134, 66, 0.08);
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Mobil Düzenlemeler */
    @media (max-width: 600px) {
      .menu-grid { gap: 16px; }
      .menu-grid.grid-view-2 { gap: 12px; }
      .grid-view-2 .item-details { padding: 10px 8px; }
      
      .grid-view-2 .item-name { font-size: 1.12rem; }
      .grid-view-2 .price { font-size: 1.05rem; }
      
      .tab-button { width: 105px; font-size: 0.85rem; gap: 10px; }
      /* Mobil için kategori ikonları %30 büyütüldü (2.44rem -> 3.17rem) */
      .tab-button i { font-size: 3.17rem; } 
      
      .menu-grid.list-view .menu-item { gap: 16px; padding: 12px; }
      .menu-grid.list-view .item-image-wrapper { width: 100px; height: 100px; aspect-ratio: 1 / 1; }
      .menu-grid.list-view .item-name { font-size: 1.4rem; }
      .menu-grid.list-view .price { font-size: 1.25rem; }

      /* Mobil için Grid butonu %40 büyütüldü (48px -> 67px) */
      .view-button { font-size: 2.35rem; width: 67px; height: 67px; }
      
      /* Mobil için Dil Seçim ekranı ölçekleri */
      #language-selection .buttons-container { max-width: 280px; margin-top: 40px; }
      #language-selection button { padding: 18px; font-size: 1.45rem; }
    }
  </style>
</head>
<body>

<div id="language-selection">
  <div class="logo">Duhok Rest & Caffee</div>

  <div class="buttons-container">
    <button data-lang="en">English</button>
    <button data-lang="ar">العربية</button>
  </div>
  <div class="social-links">
    <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
    <a href="#" class="social-icon"><i class="fab fa-whatsapp"></i></a>
    <a href="#" class="social-icon"><i class="fab fa-snapchat"></i></a>
  </div>
</div>

<div class="menu-wrapper">
    <header class="header">
    <img src="https://resizer.otstatic.com/v3/photos/52293729-4" alt="Background" class="header-bg-img">
      <div class="container">
        <h1 class="restaurant-name" id="restaurant-name"></h1>
        <p class="cuisine-text" id="cuisine-text"></p>
        <div class="contact-info">
          <span class="contact-item" id="location-text"></span>
          <span class="contact-item" id="reservation-text"></span>
        </div>
      </div>
    </header>

    <nav class="sticky-nav">
      <div class="container">
        <div class="menu-tabs" id="menu-tabs"></div>
      </div>
    </nav>

    <main class="container">
      <div class="view-controls">
          <button class="view-button active" data-view="grid-view-2" aria-label="Grid View"><i class="fas fa-th-large"></i></button>
          <button class="view-button" data-view="list-view" aria-label="List View"><i class="fas fa-list"></i></button>
      </div>
      <div class="menu-content" id="menu-content"></div>
    </main>

    <footer class="footer">
      <div class="container">
        <p id="footer-text"></p>
      </div>
    </footer>
</div>

<script id="menu-script">
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpEvyH9Kzk9aMNPhhKYzEyy2MbuMsx4qCyLwrDB0kPsqio0HWvlcIFPyQPJHTz4UJPm0eMr5X2qvWk/pub?output=csv";

  document.addEventListener("DOMContentLoaded", () => {
    const langSelection = document.getElementById("language-selection");
    const body = document.body;
    let activeView = "grid-view-2";
    let cachedData = null;

    langSelection.addEventListener("click", async (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      document.querySelectorAll('#language-selection button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const selectedLang = btn.dataset.lang;
      body.setAttribute('dir', selectedLang === 'ar' ? 'rtl' : 'ltr');
      langSelection.classList.add('hidden');
      
      try {
        if (!cachedData) {
          const response = await fetch(SHEET_URL);
          if (!response.ok) throw new Error("Veri çekilemedi.");
          const csvText = await response.text();
          cachedData = parseCSVToMenuData(csvText);
        }
        
        setTimeout(() => {
          body.classList.add('lang-selected');
          loadMenu(cachedData, selectedLang);
        }, 400);

      } catch (error) {
        console.error("Hata:", error);
        alert("Menü yüklenirken bir hata oluştu.");
      }
    });

    function parseCSVToMenuData(csvText) {
      const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
      
      const menuData = {
        "en": {
          "translations": {
            "restaurantName": "DUHOK REST & CAFFE",
            "cuisineText": "Mediterranean cuisine, premium coffee & hookah",
            "locationText": "<i class='fas fa-map-marker-alt'></i> Duhok KRO",
            "reservationText": "<i class='fas fa-phone-alt'></i> 0750 222 22 22",
            "footerText": "Developed | <strong> by Ghareeb</strong>"
          },
          "menu": {}
        },
        "ar": {
          "translations": {
            "restaurantName": "دهوك REST & CAFFE",
            "cuisineText": "مأكولات متوسطية، قهوة فاخرة وأرجيلة مميزة",
            "locationText": "<i class='fas fa-map-marker-alt'></i> دهوك KRO",
            "reservationText": "<i class='fas fa-phone-alt'></i> 0750 222 22 22",
            "footerText": "جميع الحقوق محفوظة | <strong>تم التطوير بواسطة Ghareeb</strong>"
          },
          "menu": {}
        }
      };

      for (let i = 1; i < lines.length; i++) {
        const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(item => item.replace(/^"|"$/g, '').trim());
        if (row.length < 8) continue;

        const [catId, catEn, catAr, catIcon, nameEn, nameAr, price, img] = row;
        if (!catId) continue;

        if (!menuData.en.menu[catId]) {
          menuData.en.menu[catId] = { "title": catEn, "icon": catIcon, "items": [] };
        }
        menuData.en.menu[catId].items.push({ "name": nameEn, "price": price, "img": img });

        if (!menuData.ar.menu[catId]) {
          menuData.ar.menu[catId] = { "title": catAr, "icon": catIcon, "items": [] };
        }
        menuData.ar.menu[catId].items.push({ "name": nameAr, "price": price, "img": img });
      }
      return menuData;
    }

    function loadMenu(data, lang) {
      const translations = data[lang].translations;
      const menu = data[lang].menu;

      document.getElementById("restaurant-name").textContent = translations.restaurantName;
      document.getElementById("cuisine-text").textContent = translations.cuisineText;
      document.getElementById("location-text").innerHTML = translations.locationText;
      document.getElementById("reservation-text").innerHTML = translations.reservationText;
      document.getElementById("footer-text").innerHTML = translations.footerText;

      const menuTabs = document.getElementById("menu-tabs");
      const menuContent = document.getElementById("menu-content");

      menuTabs.innerHTML = "";
      menuContent.innerHTML = "";

      Object.keys(menu).forEach((key, i) => {
        const cat = menu[key];
        const tab = document.createElement("button");
        tab.className = "tab-button";
        tab.dataset.category = key;
        tab.innerHTML = `<i class="${cat.icon}"></i><span>${cat.title}</span>`;
        if (i === 0) tab.classList.add("active");
        menuTabs.appendChild(tab);

        const section = document.createElement("div");
        section.id = `section-${key}`;
        section.className = "menu-section";
        if (i === 0) section.classList.add("active");
        section.innerHTML = `<h2>${cat.title}</h2><div class="menu-grid ${activeView}"></div>`;

        cat.items.forEach(item => {
          const itemDiv = document.createElement("div");
          itemDiv.className = "menu-item";
          itemDiv.innerHTML = `
            <div class="item-image-wrapper">
              <img src="${item.img}" alt="${item.name}" class="item-image" loading="lazy"/>
            </div>
            <div class="item-details">
              <div class="item-header">
                <span class="item-name">${item.name}</span>
                <span class="price">${item.price}</span>
              </div>
            </div>
          `;
          section.querySelector(".menu-grid").appendChild(itemDiv);
        });
        menuContent.appendChild(section);
      });

      document.querySelectorAll(".tab-button").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-button").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          document.querySelectorAll(".menu-section").forEach(sec => sec.classList.remove("active"));
          document.getElementById(`section-${btn.dataset.category}`).classList.add("active");
          btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        });
      });

      document.querySelectorAll(".view-button").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".view-button").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          activeView = btn.dataset.view;
          document.querySelectorAll(".menu-grid").forEach(grid => {
            grid.className = `menu-grid ${activeView}`;
          });
        });
      });
    }
  });
</script>

</body>
</html>
